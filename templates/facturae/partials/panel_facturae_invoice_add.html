{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Facturaeinvoice" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-facturae_invoice-form"
          hx-post="{% url 'facturae:facturae_invoice_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Invoice Number" %}</label>
            <input type="text" name="invoice_number" class="input input-sm w-full" placeholder="{% trans 'Invoice Number' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Recipient Name" %}</label>
            <input type="text" name="recipient_name" class="input input-sm w-full" placeholder="{% trans 'Recipient Name' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Recipient Tax Id" %}</label>
            <input type="text" name="recipient_tax_id" class="input input-sm w-full" placeholder="{% trans 'Recipient Tax Id' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Total Amount" %}</label>
            <input type="number" name="total_amount" class="input input-sm w-full" step="0.01" placeholder="0">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Xml Generated At" %}</label>
            <input type="datetime-local" name="xml_generated_at" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Submitted At" %}</label>
            <input type="datetime-local" name="submitted_at" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Response Code" %}</label>
            <input type="text" name="response_code" class="input input-sm w-full" placeholder="{% trans 'Response Code' %}">
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-facturae_invoice-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
